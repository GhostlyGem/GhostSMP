<!DOCTYPE html>
<html>

<head>
<title>Staff Applications</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Apply for Staff</h1>

<form id="app-form">

<input type="text" id="mcname" placeholder="Minecraft Username" required>

<select id="app-rank" required>
<option value="">Select a role</option>

<option value="Event Manager">Event Manager (Checking...)</option>
<option value="JrMod">JrMod (Checking...)</option>
<option value="Mod">Mod (Checking...)</option>
<option value="Manager">Manager (Checking...)</option>
<option value="Admin">Admin (Checking...)</option>

</select>
<input type="text" id="dcname" placeholder="Discord Name (Type "N/A" if you don't have one!)" required>

<input type="text" id="timezone" placeholder="Timezone" required>

<input type="text" id="dob" placeholder="Date of birth" required>

<input type="text" id="ingamerank" placeholder="In game rank (Your prefix)" required>

<textarea id="helpful" placeholder="What do you currently do to help other players on the server and/or on discord?" required></textarea>

<textarea id="availability" placeholder="What days are you available and for how many hours?" required></textarea>

<textarea id="aspects" placeholder="What aspects of your personality do you feel will make you a good Staff Member?" required></textarea>

<textarea id="interest" placeholder="Why are you interested in becoming a Staff Member?" required></textarea>

<label>Do you accept to follow and uphold all rules?</label>

<select id="yes-no">

<option value="">Select an answer</option>
<option value="Yes">Yes</option>
<option value="No">No</option>

</select>

<button type="submit">Submit Application</button>

</form>

<script type="module" src="apply.js"></script>

</body>

</html>
