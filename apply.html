<!DOCTYPE html>
<html>

<head>
<title>Staff Applications</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Apply for Staff</h1>

<form id="app-form">

<input type="text" id="mcname" placeholder="Minecraft Username" required>

<input type="number" id="age" placeholder="Age" required>

<textarea id="experience" placeholder="Staff Experience" required></textarea>

<button type="submit">Submit Application</button>

</form>

<script type="module" src="apply.js"></script>

</body>

</html>
