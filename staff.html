<!DOCTYPE html>
<html>
<head>
<title>Staff Panel | GhostSMP</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.topbar h1{
margin:0;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.section{
margin-bottom:40px;
}

.application{
background:#1e1e1e;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

button,
.panel-link{
margin-top:10px;
margin-right:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font:inherit;
text-decoration:none;
display:inline-block;
}

.panel-link{
background:#333;
color:white;
}

.approve{
background:#2ecc71;
color:white;
}

.deny,
#staff-logout-btn,
.remove-pvp-player,
.remove-meet-staff{
background:#e74c3c;
color:white;
}

.rank{
font-size:14px;
opacity:.7;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

.staff-form{
display:grid;
grid-template-columns:repeat(3,minmax(140px,1fr));
gap:12px;
max-width:720px;
}

.staff-form input{
padding:10px;
border:none;
border-radius:6px;
font:inherit;
}

.staff-form button{
justify-self:start;
}

.pvp-player,
.meet-staff-player{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;
}

.pvp-player-info,
.meet-staff-player-info{
display:flex;
align-items:center;
gap:10px;
}

.pvp-player img,
.meet-staff-player img{
width:40px;
height:40px;
border-radius:4px;
image-rendering:pixelated;
}

@media (max-width: 700px){
body{
padding:20px;
}

.topbar{
align-items:flex-start;
flex-direction:column;
}

.staff-form{
grid-template-columns:1fr;
}

.pvp-player,
.meet-staff-player{
align-items:flex-start;
flex-direction:column;
}
}

</style>
</head>

<body>

<div class="topbar">
<h1>GhostSMP Staff Panel</h1>
<div class="top-actions">
<a class="panel-link" href="/">Home</a>
<a class="panel-link" href="/account.html">Account</a>
<button id="staff-logout-btn">Logout</button>
</div>
</div>

<p id="loading">Checking if you are a Staff Member...</p>

<div id="dashboard" style="display:none;">

<div class="section" id="pvp-editor-section" style="display:none;">

<h2>PvP Rankings</h2>

<form id="pvp-rank-form" class="staff-form">
<input id="pvp-username" type="text" placeholder="Minecraft username" required>
<input id="pvp-position" type="number" min="1" step="1" placeholder="Rank position" required>
<input id="pvp-level" type="text" placeholder="Level, ex: LT 3 or HT 1" required>
<button class="approve" type="submit">Save PvP Rank</button>
</form>

<div id="pvp-rank-list"></div>

</div>

<div class="section" id="meet-staff-editor-section" style="display:none;">

<h2>Meet the Staff</h2>

<form id="meet-staff-form" class="staff-form">
<input id="meet-staff-username" type="text" placeholder="Minecraft username" required>
<input id="meet-staff-position" type="number" min="1" step="1" placeholder="Display order" required>
<button class="approve" type="submit">Add Staff Member</button>
</form>

<div id="meet-staff-list"></div>

</div>

<div class="section">

<h2>Staff Activity Log</h2>

<div id="staff-logs"></div>

</div>

<div class="section">

<h2>Pending Applications</h2>
<div id="applications"></div>

</div>

<div class="section">

<h2>Staff Management</h2>
<div id="staff-list"></div>

</div>

</div>

<script type="module" src="staff.js"></script>
<script type="module" src="staff-pvp.js"></script>
<script type="module" src="staff-meet.js"></script>

</body>
</html>
