<!DOCTYPE html>
<html>
<head>
<title>Staff Panel | GhostSMP</title>
<link rel="icon" type="image/png" href="/favicon.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.section{
margin-bottom:40px;
}

.application{
background:#1e1e1e;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

button{
margin-top:10px;
margin-right:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.approve{
background:#2ecc71;
color:white;
}

.deny{
background:#e74c3c;
color:white;
}

.rank{
font-size:14px;
opacity:.7;
}

</style>
</head>

<body>

<h1>GhostSMP Staff Panel</h1>

<p id="loading">Checking if you are a Staff Member...</p>

<div id="dashboard" style="display:none;">

<div class="section">

<h2>Staff Activity Log</h2>

<div id="staff-logs"></div>

</div>

<div class="section">

<h2>Pending Applications</h2>
<div id="applications"></div>

</div>

<div class="section">

<h2>Staff Management</h2>
<div id="staff-list"></div>

</div>

</div>

<script type="module" src="staff.js"></script>

</body>
</html>
