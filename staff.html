<!DOCTYPE html>
<html>
<head>
<title>Staff Panel | GhostSMP</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
gap:20px;
margin-bottom:20px;
}

.topbar h1{
margin:0;
}

.top-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.section{
margin-bottom:40px;
}

.application{
background:#1e1e1e;
padding:20px;
margin-bottom:15px;
border-radius:8px;
}

button,
.panel-link{
margin-top:10px;
margin-right:10px;
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font:inherit;
text-decoration:none;
display:inline-block;
}

.panel-link{
background:#333;
color:white;
}

.approve{
background:#2ecc71;
color:white;
}

.deny,
#staff-logout-btn{
background:#e74c3c;
color:white;
}

.rank{
font-size:14px;
opacity:.7;
}

button:disabled{
opacity:.5;
cursor:not-allowed;
}

@media (max-width: 700px){
body{
padding:20px;
}

.topbar{
align-items:flex-start;
flex-direction:column;
}
}

</style>
</head>

<body>

<div class="topbar">
<h1>GhostSMP Staff Panel</h1>
<div class="top-actions">
<a class="panel-link" href="/">Home</a>
<a class="panel-link" href="/account.html">Account</a>
<button id="staff-logout-btn">Logout</button>
</div>
</div>

<p id="loading">Checking if you are a Staff Member...</p>

<div id="dashboard" style="display:none;">

<div class="section">

<h2>Staff Activity Log</h2>

<div id="staff-logs"></div>

</div>

<div class="section">

<h2>Pending Applications</h2>
<div id="applications"></div>

</div>

<div class="section">

<h2>Staff Management</h2>
<div id="staff-list"></div>

</div>

</div>

<script type="module" src="staff.js"></script>

</body>
</html>
