<!DOCTYPE html>
<html>

<head>
<title>Account Settings | GhostSMP</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Account Settings</h1>

<h3>Stats</h3>
<p id="stats"></p>

<div class="account-box">

<label>Display Name</label>

<input type="text" id="display-name">

<button id="save-name">Save</button>

<h3>Minecraft Username</h3>

<input id="mc-username" placeholder="Enter your Minecraft username">
<img id="mc-preview" width="64">

<button id="save-mc">Save</button>

<div id="staff-panel-area" style="display:none; margin-top:20px;">
  
  <h3>Staff Tools</h3>
  
  <button id="staff-dashboard-btn">
    Open Staff Dashboard
  </button>

</div>
  
</div>

<p>More settings coming soon!</p>

<script type="module" src="account.js"></script>

</body>

</html>
