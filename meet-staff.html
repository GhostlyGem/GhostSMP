<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meet the Staff | GhostSMP</title>
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="stylesheet" href="style.css?v=staff-colors-1">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
.meet-staff-grid{
  display:flex;
  flex-direction:column;
  gap:28px;
  max-width:1050px;
  margin:40px auto 0;
}

.meet-staff-role-box{
  border:4px solid rgba(255,255,255,0.35);
  border-radius:8px;
  background:rgba(255,255,255,0.05);
  padding:24px;
  box-shadow:0 0 18px rgba(0,0,0,0.35);
}

.meet-staff-role-box h2{
  margin:0 0 22px;
  text-align:center;
  font-size:16px;
}

.meet-staff-role-members{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:flex-start;
  gap:22px;
  min-height:34px;
}

.meet-staff-role-box.owner{
  border-color:#66FFFF;
}

.meet-staff-role-box.head-admin{
  border-color:#800020;
}

.meet-staff-role-box.admin{
  border-color:#FF0000;
}

.meet-staff-role-box.manager{
  border-color:#FFEA00;
}

.meet-staff-role-box.mod{
  border-color:#9DFF00;
}

.meet-staff-role-box.jrmod{
  border-color:#66FFFF;
  box-shadow:0 0 0 3px #9DFF00 inset, 0 0 18px rgba(0,0,0,0.35);
}

.meet-staff-role-box.event-manager{
  border-color:#9F7CFF;
}
</style>
</head>

<body>

<header>
<img src="logo.png" class="logo" alt="GhostSMP logo">

<nav>
<a href="index.html">Home</a>
<a href="vote.html">Vote</a>
<a href="membership.html">Store</a>
<a href="rules.html">Rules</a>
<a href="apply.html">Apply</a>
<a href="/pvp.html">PvP</a>
</nav>
</header>

<section class="page">
<h1>Meet the Staff</h1>
<div id="meet-staff-grid" class="meet-staff-grid">
  <section class="meet-staff-role-box event-manager" data-role="Event Manager">
    <h2>Event Managers</h2>
    <div class="meet-staff-role-members" data-members="Event Manager"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box jrmod" data-role="JrMod">
    <h2>JrMods</h2>
    <div class="meet-staff-role-members" data-members="JrMod"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box mod" data-role="Mod">
    <h2>Mods</h2>
    <div class="meet-staff-role-members" data-members="Mod"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box manager" data-role="Manager">
    <h2>Managers</h2>
    <div class="meet-staff-role-members" data-members="Manager"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box admin" data-role="Admin">
    <h2>Admins</h2>
    <div class="meet-staff-role-members" data-members="Admin"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box head-admin" data-role="Head Admin">
    <h2>Head Admins</h2>
    <div class="meet-staff-role-members" data-members="Head Admin"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>

  <section class="meet-staff-role-box owner" data-role="Owner">
    <h2>Owner</h2>
    <div class="meet-staff-role-members" data-members="Owner"><div class="meet-staff-empty">No staff listed.</div></div>
  </section>
</div>
</section>

<script type="module" src="meet-staff.js?v=uncategorized-1"></script>

</body>
</html>
