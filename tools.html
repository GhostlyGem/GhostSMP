<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Server Tools | GhostSMP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <img src="images/logo.png" alt="GhostSMP Logo" class="logo">
  </header>

  <div class="tools-container">
    <div class="tool-card">
      <h1 class="tools-title">Server Rules Generator</h1>
      <p class="tools-subtitle">
        Describe your Minecraft server and generate a starter rules list.
      </p>

      <textarea
        id="input"
        placeholder="Example: Survival server with PvP in arenas only, no griefing, family-friendly chat..."
      ></textarea>

      <button onclick="generateRules()">Generate Rules</button>

      <div id="output">Your generated rules will appear here.</div>
    </div>
  </div>

  <script src="tools.js"></script>
</body>
</html>
